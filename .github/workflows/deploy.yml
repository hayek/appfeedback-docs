name: Deploy docs to GitHub Pages

# For a GitHub Pages *project* site (https://hayek.github.io/appfeedback-docs),
# set `site: 'https://hayek.github.io'` and `base: '/appfeedback-docs'` in
# astro.config.mjs before enabling Pages. For a custom domain or user/org page,
# leave `base` unset (the current default builds at root).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build with Astro
        uses: withastro/action@v4 # auto-detects pnpm, installs, runs `astro build`, uploads the artifact
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
